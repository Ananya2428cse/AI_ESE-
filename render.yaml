services:
  # ─── Express Backend Web Service ──────────────────────────────────────────
  - type: web
    name: ai-hr-backend-ese
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # ─── Vite React Frontend Static Site ──────────────────────────────────────
  - type: web
    name: ai-hr-frontend-ese
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: "https://ai-hr-backend-ese.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
